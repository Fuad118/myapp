<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Energy Wheel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1320;
color:white;
overflow:hidden;
}

.page{
width:100%;
height:100vh;
display:none;
padding:20px;
}

.active{
display:block;
}

h1{
margin-bottom:25px;
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.card{

background:#1a2438;

border-radius:25px;

height:230px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:24px;

font-weight:bold;

transition:.25s;

}

.card:active{

transform:scale(.96);

}

.preview{

width:120px;
height:120px;
border-radius:50%;

background:

conic-gradient(

#5ec7ff 0 45deg,
#8d5cff 45deg 90deg,
#53e37b 90deg 135deg,
#ffc74d 135deg 180deg,
#ff6c6c 180deg 225deg,
#45d3ff 225deg 270deg,
#9a6bff 270deg 315deg,
#53e37b 315deg 360deg

);

border:6px solid white;

margin-bottom:18px;

animation:previewSpin 8s linear infinite;

}

@keyframes previewSpin{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}

.profileIcon{

font-size:90px;

margin-bottom:18px;

}

.back{

font-size:22px;

margin-bottom:20px;

}

.wheelBox{

display:flex;

justify-content:center;

margin-top:30px;

position:relative;

}
