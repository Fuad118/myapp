<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wheel of Fortune</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d1320;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

h1{
margin-bottom:20px;
}

/* WRAPPER */
.wheel-box{
position:relative;
width:340px;
height:340px;
}

/* POINTER */
.pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:16px solid transparent;
border-right:16px solid transparent;
border-bottom:28px solid #ff3b3b;
z-index:10;
}

/* WHEEL */
.wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
background:conic-gradient(
#ff4d4d 0 45deg,
#4da6ff 45deg 90deg,
#4dff88 90deg 135deg,
#ffd24d 135deg 180deg,
#b84dff 180deg 225deg,
#ff884d 225deg 270deg,
#4dfff6 270deg 315deg,
#ff4da6 315deg 360deg
);
transition: transform 4s cubic-bezier(.12,.67,.18,1);
}

/* BUTTON */
button{
margin-top:25px;
padding:12px 26px;
font-size:18px;
border:none;
border-radius:12px;
background:#5ec7ff;
cursor:pointer;
font-weight:bold;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

/* RESULT */
.result{
margin-top:15px;
font-size:20px;
min-height:25px;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
}
</style>
</head>

<body>

<h1>🎡 Fortune Wheel</h1>

<div class="wheel-box">

<div class="pointer"></div>
<div id="wheel" class="wheel"></div>

</div>

<button id="spinBtn" onclick="spin()">КРУТИТЬ</button>

<div id="result" class="result"></div>

<div id="overlay" class="overlay"></div>

<script>
const wheel = document.getElementById("wheel");
const btn = document.getElementById("spinBtn");
const result = document.getElementById("result");
const overlay = document.getElementById("overlay");

let rotation = 0;

const prizes = [
"1000 монет",
"500 монет",
"Ничего",
"2x множитель",
"250 монет",
"Супер приз",
"300 монет",
"750 монет"
];

function spin(){

btn.disabled = true;
overlay.style.display = "block";
result.innerHTML = "";

let index = Math.floor(Math.random() * prizes.length);
let sector = 360 / prizes.length;

// цель остановки
let stop = (360 - index * sector) - sector/2;

// добавляем обороты
rotation += 5 * 360 + stop;

wheel.style.transform = `rotate(${rotation}deg)`;

// результат
setTimeout(()=>{
result.innerHTML = "🎉 Вы выиграли: " + prizes[index];
btn.disabled = false;
overlay.style.display = "none";
}, 4200);
}
</script>

</body>
</html>
