<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fortune Wheel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d1320;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

h1{
margin-bottom:20px;
}

.wheel-wrapper{
position:relative;
width:320px;
height:320px;
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
background:conic-gradient(
#ff4d4d 0 45deg,
#4da6ff 45deg 90deg,
#4dff88 90deg 135deg,
#ffd24d 135deg 180deg,
#b84dff 180deg 225deg,
#ff884d 225deg 270deg,
#4dfff6 270deg 315deg,
#ff4da6 315deg 360deg
);
transition: transform 4s cubic-bezier(.17,.67,.12,.99);
}

.pointer{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:30px solid red;
}

button{
margin-top:30px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#5ec7ff;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>🎡 Fortune Wheel</h1>

<div class="wheel-wrapper">

<div class="pointer"></div>
<div id="wheel" class="wheel"></div>

</div>

<button onclick="spin()">КРУТИТЬ</button>

<div id="result" class="result"></div>

<script>
let wheel = document.getElementById("wheel");
let result = document.getElementById("result");

let currentRotation = 0;

// призы (по секторам)
const prizes = [
"1000 монет",
"500 монет",
"Ничего",
"2x множитель",
"250 монет",
"Супер приз",
"300 монет",
"750 монет"
];

function spin(){

let randomIndex = Math.floor(Math.random() * prizes.length);

// угол сектора
let sectorAngle = 360 / prizes.length;

// цель остановки
let stopAngle = (360 - (randomIndex * sectorAngle)) - (sectorAngle / 2);

// добавляем обороты + цель
let spins = 5 * 360;

currentRotation += spins + stopAngle;

wheel.style.transform = `rotate(${currentRotation}deg)`;

// показываем результат
setTimeout(()=>{
result.innerHTML = "Вы выиграли: " + prizes[randomIndex];
}, 4200);
}
</script>

</body>
</html>
