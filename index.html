<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game UI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.main{
background:#1e293b;
border-radius:25px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
height:320px;
margin-bottom:25px;
}

.left{
width:45%;
}

.left h1{
font-size:40px;
margin-bottom:15px;
}

.left p{
font-size:18px;
color:#bfc8d4;
margin-bottom:20px;
}

.spin{
background:#3390ec;
border:none;
border-radius:15px;
padding:15px 35px;
font-size:20px;
color:white;
}

.right{
width:55%;
display:flex;
justify-content:center;
align-items:center;
}

.wheel{
width:220px;
height:220px;
border-radius:50%;
background:
conic-gradient(
#ff4d4d 0deg 45deg,
#ffd43b 45deg 90deg,
#51cf66 90deg 135deg,
#4dabf7 135deg 180deg,
#845ef7 180deg 225deg,
#ff922b 225deg 270deg,
#20c997 270deg 315deg,
#f06595 315deg 360deg
);
border:10px solid gold;
box-shadow:0 0 25px gold;
animation:rotateWheel 10s linear infinite;
}

@keyframes rotateWheel{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

.menu{
display:flex;
gap:20px;
}

.button{
flex:1;
height:140px;
background:#1e293b;
border-radius:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:bold;
}

.button span{
font-size:20px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="main">

<div class="left">

<h1>🎡 КОЛЕСО</h1>

<p>Испытай удачу и получай награды.</p>

<button class="spin">КРУТИТЬ</button>

</div>

<div class="right">

<div class="wheel"></div>

</div>

</div>

<div class="menu">

<div class="button">
🎡
<span>Колесо</span>
</div>

<div class="button">
👤
<span>Профиль</span>
</div>

</div>

</body>
</html><div class="card">ℹ️<br>Информация</div>

</div>

<div class="footer">

<div class="item">🏠<br>Главная</div>

<div class="item">🎮<br>Игра</div>

<div class="item">👤<br>Аккаунт</div>

</div>

</div>

</body>
</html>
