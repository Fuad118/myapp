<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Energy Wheel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d1320;
color:white;
overflow:hidden;
}

.page{
display:none;
height:100vh;
width:100%;
}

.active{
display:block;
}

/* HOME */
#home{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:#1a2438;
height:200px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
}

.preview{
width:100px;
height:100px;
border-radius:50%;
background:conic-gradient(red,blue,green,yellow,red);
}

/* WHEEL PAGE */
#wheelPage{
position:relative;
}

.center{
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
}

.bigWheel{
width:280px;
height:280px;
border-radius:50%;
background:conic-gradient(red,blue,green,yellow,red);
border:8px solid white;
transition:transform 3s ease-out;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#5ec7ff;
cursor:pointer;
}

.back{
position:absolute;
top:15px;
left:15px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<h1>Energy Wheel</h1>

<div class="grid">

<div class="card" onclick="openWheel()">
<div class="preview"></div>
Wheel 1
</div>

<div class="card">
<div class="preview"></div>
Wheel 2
</div>

</div>

</div>

<!-- WHEEL -->
<div id="wheelPage" class="page">

<div class="back" onclick="goHome()">← Back</div>

<div class="center">

<div id="wheel" class="bigWheel"></div>

<button onclick="spin()">SPIN</button>

</div>

</div>

<script>
let angle = 0;

function openWheel(){
document.getElementById("home").classList.remove("active");
document.getElementById("wheelPage").classList.add("active");
}

function goHome(){
document.getElementById("wheelPage").classList.remove("active");
document.getElementById("home").classList.add("active");
}

function spin(){
angle += Math.floor(Math.random()*2000 + 720);
document.getElementById("wheel").style.transform = `rotate(${angle}deg)`;
}
</script>

</body>
</html>
