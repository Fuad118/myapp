<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Wheel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d1320;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1{ margin-bottom:10px; }

.balance{
font-size:18px;
padding:8px 14px;
background:#1a2438;
border-radius:10px;
margin-bottom:10px;
}

.timer{
margin-bottom:15px;
color:#ffcc66;
min-height:20px;
}

.wheel-box{
position:relative;
width:320px;
height:320px;
}

.pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
border-left:14px solid transparent;
border-right:14px solid transparent;
border-bottom:26px solid red;
z-index:10;
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;
background:conic-gradient(
#ff4d4d 0 45deg,
#4da6ff 45deg 90deg,
#4dff88 90deg 135deg,
#ffd24d 135deg 180deg,
#b84dff 180deg 225deg,
#ff884d 225deg 270deg,
#4dfff6 270deg 315deg,
#ff4da6 315deg 360deg
);
transition: transform 4s cubic-bezier(.12,.67,.18,1);
}

button{
margin-top:20px;
padding:12px 24px;
font-size:18px;
border:none;
border-radius:10px;
background:#5ec7ff;
cursor:pointer;
font-weight:bold;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

.result{
margin-top:15px;
font-size:18px;
min-height:25px;
}

</style>
</head>

<body>

<h1>🎡 Daily Wheel</h1>

<div class="balance">
💰 Баланс: <span id="balance">0</span>
</div>

<div class="timer" id="timer"></div>

<div class="wheel-box">
<div class="pointer"></div>
<div id="wheel" class="wheel"></div>
</div>

<button id="spinBtn" onclick="spin()">КРУТИТЬ</button>

<div class="result" id="result"></div>

<script>

const wheel = document.getElementById("wheel");
const btn = document.getElementById("spinBtn");
const result = document.getElementById("result");
const balanceEl = document.getElementById("balance");
const timerEl = document.getElementById("timer");

let rotation = 0;

// баланс
let balance = localStorage.getItem("balance");
balance = balance ? parseInt(balance) : 0;
balanceEl.innerText = balance;

// награды
const prizes = [1000,500,0,200,250,1500,300,750];

// cooldown (24 часа)
const COOLDOWN = 24 * 60 * 60 * 1000;

function getLastSpin(){
return parseInt(localStorage.getItem("lastSpin") || "0");
}

function setLastSpin(){
localStorage.setItem("lastSpin", Date.now());
}

function canSpin(){
return Date.now() - getLastSpin() >= COOLDOWN;
}

function updateTimer(){
if(canSpin()){
timerEl.innerText = "🎁 Бесплатный спин доступен!";
btn.disabled = false;
return;
}

let diff = COOLDOWN - (Date.now() - getLastSpin());

let h = Math.floor(diff / (1000*60*60));
let m = Math.floor((diff % (1000*60*60)) / (1000*60));
let s = Math.floor((diff % (1000*60)) / 1000);

timerEl.innerText = `⏳ Следующий спин через ${h}ч ${m}м ${s}с`;
btn.disabled = true;
}

setInterval(updateTimer, 1000);
updateTimer();

function spin(){

if(!canSpin()) return;

btn.disabled = true;
setLastSpin();

let index = Math.floor(Math.random()*prizes.length);
let sector = 360 / prizes.length;

let stop = (360 - index*sector) - sector/2;

rotation += 5*360 + stop;
wheel.style.transform = `rotate(${rotation}deg)`;

setTimeout(()=>{

let win = prizes[index];

if(win === 0){
result.innerText = "❌ Ничего";
} else {
result.innerText = "🎉 +" + win + " монет";
balance += win;
localStorage.setItem("balance", balance);
balanceEl.innerText = balance;
}

updateTimer();

}, 4200);
}

</script>

</body>
</html>
